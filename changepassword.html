<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Saira:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Icon Font Stylesheet -->
  <link rel="stylesheet" href="fontawesome/all.min.css">
  <link rel="stylesheet" href="bootstrap-icons/bootstrap-icons.css">

  <!-- Template Stylesheets -->
  <link href="css/mini-bootstrap.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link href="css/mobile.css" rel="stylesheet">
  <link href="css/notifmodal.css" rel="stylesheet">

  <!-- Dashboard specific overrides -->
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/topbar.css">
</head>
<body>
    <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">📊 Admin</span>
      <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle sidebar">
        <span class="toggle-bar"></span>
        <span class="toggle-bar"></span>
        <span class="toggle-bar"></span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></a>
      <a href="transactions.html"><span class="nav-icon">📊</span><span class="nav-text">Transactions</span></a>
      <a href="notifications.html"><span class="nav-icon">🔔</span><span class="nav-text">Notifications</span></a>
      <a class="active" href="changepassword.html"><span class="nav-icon">⚙️</span><span class="nav-text">Change Password</span></a>
      <a href="index.html"><span class="nav-icon">💳</span><span class="nav-text">Acceuille</span></a>
    </nav>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  
  <!-- Main -->
  <main class="main">

    <!-- Header -->
    <header class="topbar">
      <button id="mobileMenuToggle" class="mobile-menu-btn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <h1>Change Password</h1>
      <div class="user" id="topbarUser">
        <button><span>John Doe</span>
        <i class="fa fa-user" aria-hidden="true"></i></button>
      </div>
    </header>

    <section class="content">
      <div class="box change-box" style="max-width:820px;margin:0 auto;">
        <h3>Change your password</h3>
        <p class="muted">Choose a strong password to keep your account secure.</p>

        <form id="changePasswordForm" class="change-form" onsubmit="handleChange(event); return false;">
          <div class="form-row">
            <label for="currentPassword">Current password</label>
            <div class="input-with-toggle">
              <input id="currentPassword" type="password" required placeholder="Enter current password">
              <button type="button" class="toggle-pass" data-target="currentPassword" aria-label="Show password">👁️</button>
            </div>
          </div>

          <div class="form-row">
            <label for="newPassword">New password</label>
            <div class="input-with-toggle">
              <input id="newPassword" type="password" required placeholder="At least 8 characters">
              <button type="button" class="toggle-pass" data-target="newPassword" aria-label="Show password">👁️</button>
            </div>
            <div class="pw-meter">
              <div id="pwStrength" class="pw-bar"></div>
              <small id="pwHint" class="muted">Use upper/lower letters, numbers and symbols.</small>
            </div>
          </div>

          <div class="form-row">
            <label for="confirmPassword">Confirm new password</label>
            <div class="input-with-toggle">
              <input id="confirmPassword" type="password" required placeholder="Repeat new password">
              <button type="button" class="toggle-pass" data-target="confirmPassword" aria-label="Show password">👁️</button>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update password</button>
            <button type="button" class="btn btn-outline" onclick="resetForm()">Reset</button>
          </div>

          <div id="formMessage" role="status" aria-live="polite" style="margin-top:12px;"></div>
        </form>
      </div>
    </section>

  </main>

  <style>
    /* Change Password page-specific styles */
    .change-box h3 { margin-bottom:6px; }
    .change-box .muted { color:#64748b; margin-bottom:14px; }
    .change-form { display:block; gap:12px; }
    .form-row { margin-bottom:14px; }
    .form-row label { display:block; font-weight:600; margin-bottom:8px; color:#0f172a; }
    .input-with-toggle { display:flex; align-items:center; gap:8px; }
    .input-with-toggle input { flex:1; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; }
    .toggle-pass { background:#f1f5f9; border:none; padding:8px 10px; border-radius:8px; cursor:pointer; }
    .pw-meter { margin-top:8px; }
    .pw-bar { height:8px; border-radius:8px; background:linear-gradient(90deg,#e2e8f0,#e2e8f0); transition:background 0.2s,width 0.2s; }
    .pw-bar.weak { background: linear-gradient(90deg,#ef4444,#f97316); width:33%; }
    .pw-bar.medium { background: linear-gradient(90deg,#f59e0b,#f97316); width:66%; }
    .pw-bar.strong { background: linear-gradient(90deg,#10b981,#059669); width:100%; }
    .form-actions { display:flex; gap:10px; margin-top:8px; }
    .btn-outline { background:#f8fafc; border:1px solid #e2e8f0; padding:8px 14px; border-radius:10px; cursor:pointer; }

    @media (max-width:900px) {
      .change-box { padding:16px; margin:12px; }
      .topbar { position: sticky; top:0; z-index:220; }
    }
  </style>

  <script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-pass').forEach(function(btn){
      btn.addEventListener('click', function(){
        const id = btn.getAttribute('data-target');
        const input = document.getElementById(id);
        if (!input) return;
        if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
        else { input.type = 'password'; btn.textContent = '👁️'; }
      });
    });

    // Password strength
    const newPw = document.getElementById('newPassword');
    const strength = document.getElementById('pwStrength');
    const hint = document.getElementById('pwHint');
    function calcStrength(val){
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      return score;
    }
    newPw && newPw.addEventListener('input', function(){
      const s = calcStrength(newPw.value);
      strength.className = 'pw-bar';
      if (s <= 1) { strength.classList.add('weak'); hint.textContent = 'Too weak'; }
      else if (s === 2) { strength.classList.add('medium'); hint.textContent = 'Could be stronger'; }
      else { strength.classList.add('strong'); hint.textContent = 'Strong password'; }
    });

    async function handleChange(e){
      e.preventDefault();
      const cur = document.getElementById('currentPassword').value.trim();
      const nw = document.getElementById('newPassword').value.trim();
      const cf = document.getElementById('confirmPassword').value.trim();
      const msg = document.getElementById('formMessage');
      msg.textContent = '';
      msg.style.color = '';
      if (nw.length < 8) { msg.textContent = 'New password must be at least 8 characters.'; msg.style.color = '#ef4444'; return false; }
      if (nw !== cf) { msg.textContent = 'Passwords do not match.'; msg.style.color = '#ef4444'; return false; }

      // determine user id from auth or localStorage
      let idUser = null;
      try{
        if(window.getAuth && typeof window.getAuth === 'function'){ const a = window.getAuth(); if(a && a.user){ const u = a.user; idUser = u.id || u._id || u.idUser || u.userId || u.numeroWhatsapp || u.numero || u.phone; } }
      }catch(e){}
      try{ if(!idUser){ const raw = localStorage.getItem('authUser'); if(raw){ const u = JSON.parse(raw); idUser = u.id || u._id || u.idUser || u.userId || u.numeroWhatsapp || u.numero || u.phone; } } }catch(e){}

      const payload = { idUser: idUser || 0, currentPassword: cur, newPassword: nw };
      const btn = document.querySelector('#changePasswordForm button[type="submit"]');
      if(btn) btn.disabled = true;
      const API = 'http://185.213.27.226:7071/api/wifi/change-password';
      try{
        const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await (res.ok ? res.json().catch(()=>({})) : res.json().catch(()=>({})));
        if(!res.ok){
          msg.textContent = data && (data.message || data.error) ? (data.message || data.error) : 'Failed to change password: Ensure you enter the correct current password.';
          msg.style.color = '#ef4444';
        } else {
          msg.textContent = data && data.message ? data.message : 'Password updated successfully.';
          msg.style.color = '#059669';
          document.getElementById('changePasswordForm').reset();
          strength.className = 'pw-bar';
          hint.textContent = 'Use upper/lower letters, numbers and symbols.';
        }
      }catch(err){ console.error('Change password error', err); msg.textContent = 'Network error.'; msg.style.color = '#ef4444'; }
      if(btn) btn.disabled = false;
      return false;
    }

    function resetForm(){
      document.getElementById('changePasswordForm').reset();
      document.getElementById('formMessage').textContent = '';
      strength.className = 'pw-bar';
      document.getElementById('pwHint').textContent = 'Use upper/lower letters, numbers and symbols.';
    }

  // Sidebar toggle (same as dashboard)
  (function(){
    const sidebar = document.getElementById('sidebar');
    const toggle = document.getElementById('sidebarToggle');
    const mobileToggle = document.getElementById('mobileMenuToggle');
    const overlay = document.getElementById('sidebarOverlay');
    const body = document.body;

    function isMobile() { return window.innerWidth <= 900; }

    if (!isMobile() && localStorage.getItem('sidebarCollapsed') === '1') {
      body.classList.add('sidebar-collapsed');
    }

    function toggleSidebar(e) {
      if (e) e.stopPropagation();
      if (isMobile()) {
        body.classList.toggle('sidebar-open');
      } else {
        const collapsed = body.classList.toggle('sidebar-collapsed');
        localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0');
      }
    }

    toggle.addEventListener('click', toggleSidebar);
    mobileToggle.addEventListener('click', toggleSidebar);

    overlay.addEventListener('click', function() {
      body.classList.remove('sidebar-open');
    });

    sidebar.querySelectorAll('.sidebar-nav a').forEach(function(link) {
      link.addEventListener('click', function() {
        if (isMobile()) body.classList.remove('sidebar-open');
      });
    });

    window.addEventListener('resize', function() {
      if (isMobile()) {
        body.classList.remove('sidebar-collapsed');
      } else {
        body.classList.remove('sidebar-open');
      }
    });
  })();
  </script>

</body>
<script src="js/topbar.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function(){
  try{
    const raw = localStorage.getItem('roles');
    if(!raw) return;
    let roles = null; try{ roles = JSON.parse(raw); } catch(e){ roles = raw; }
    let hasPart = false;
    if (Array.isArray(roles)) hasPart = roles.includes('particulier') || roles.includes('PARTICULIER');
    else if (typeof roles === 'string') hasPart = roles.toLowerCase().indexOf('particulier') !== -1;
    if (hasPart) {
      try{
        const nav = document.querySelector('.sidebar-nav');
        if(nav){
          const anchors = Array.from(nav.querySelectorAll('a'));
          anchors.forEach(a=>{
            const href = a.getAttribute('href');
            const keep = href === 'notifications.html' || href === 'changepassword.html' || href === 'index.html';
            a.style.display = keep ? 'block' : 'none';
          });
        }
      }catch(e){}
    }
  } catch(e) { /* ignore */ }
});
</script>

</html>
